name: Build skill ZIPs

on:
  push:
    branches: [main]
    paths:
      - 'plugins/reidworks-core/skills/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect newly added skills
        id: newskills
        run: |
          set -euo pipefail
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            NEW=$(git diff --name-status HEAD~1 HEAD -- 'plugins/reidworks-core/skills/*/SKILL.md' \
                  | awk '$1=="A" {print $2}' \
                  | awk -F'/' '{print $(NF-1)}' \
                  | sort -u \
                  | paste -sd ',' -)
          else
            NEW=""
          fi
          echo "new_skills=$NEW" >> "$GITHUB_OUTPUT"
          echo "Newly added skills: ${NEW:-<none>}"

      - name: Build per-skill ZIPs
        run: |
          set -euo pipefail
          mkdir -p dist
          for d in plugins/reidworks-core/skills/*/; do
            name=$(basename "$d")
            (cd "$d" && zip -r "${GITHUB_WORKSPACE}/dist/${name}.zip" .)
            echo "✓ dist/${name}.zip"
          done
          ls -la dist/

      - name: Publish or update 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES=$(cat <<'EOF'
          Per-skill ZIPs for **Cowork (personal account)** install.

          ### How to install in Cowork
          1. Download the ZIP for the skill you want (below).
          2. In Cowork: open **Customize → Skills**.
          3. Click the **+** at the top of the Skills sidebar → **+ Create skill**.
          4. Choose **Upload a skill** and upload the ZIP.

          For Claude Code, prefer the marketplace install — see the README.

          _This release is auto-rebuilt on every push to `main`. The commit it was built from is in the workflow run logs._
          EOF
          )

          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Updating existing 'latest' release"
            gh release edit latest --repo "$GITHUB_REPOSITORY" --notes "$NOTES" --title "Latest skills"
            gh release upload latest --repo "$GITHUB_REPOSITORY" dist/*.zip --clobber
          else
            echo "Creating 'latest' release"
            gh release create latest --repo "$GITHUB_REPOSITORY" dist/*.zip \
              --title "Latest skills" \
              --notes "$NOTES" \
              --latest
          fi

      - name: Notify Slack on new skills
        if: steps.newskills.outputs.new_skills != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEW_SKILLS: ${{ steps.newskills.outputs.new_skills }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          set -ux -o pipefail

          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set — skipping Slack notification."
            exit 0
          fi

          CATALOG="https://reidworks-io.github.io/reidworks-skills/"
          RELEASE="https://github.com/${GITHUB_REPOSITORY}/releases/tag/latest"

          SKILL_LINES=""
          IFS=',' read -ra SKILLS <<< "$NEW_SKILLS" || true
          for s in "${SKILLS[@]}"; do
            ZIP="https://github.com/${GITHUB_REPOSITORY}/releases/download/latest/${s}.zip"
            SKILL_LINES="${SKILL_LINES}• *${s}* — <${ZIP}|Download ZIP>"$'\n'
          done

          COUNT=${#SKILLS[@]}
          if [ "$COUNT" -gt 1 ]; then
            HEADER="🆕 ${COUNT} new Reidworks skills"
          else
            HEADER="🆕 1 new Reidworks skill"
          fi

          PAYLOAD=$(jq -n \
            --arg header "$HEADER" \
            --arg body "$SKILL_LINES" \
            --arg catalog "$CATALOG" \
            --arg release "$RELEASE" \
            --arg commit_url "$COMMIT_URL" \
            --arg author "$COMMIT_AUTHOR" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: $header } },
                { type: "section", text: { type: "mrkdwn", text: $body } },
                {
                  type: "context",
                  elements: [
                    { type: "mrkdwn", text: ("Added by *" + $author + "* · <" + $commit_url + "|commit> · <" + $catalog + "|catalog> · <" + $release + "|all ZIPs>") }
                  ]
                }
              ]
            }')

          echo "Posting to Slack:"
          echo "$PAYLOAD"
          HTTP_CODE=$(curl -sS -o /tmp/slack-response -w "%{http_code}" \
            -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL")
          echo "Slack response code: $HTTP_CODE"
          echo "Slack response body: $(cat /tmp/slack-response)"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Slack notification failed (HTTP $HTTP_CODE)"
            exit 1
          fi
